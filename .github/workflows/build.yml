name: Build IPv4 Cloud ASN CIDR List

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run generator
        run: python generate_cidr_list.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add output/cidr.txt

          # Only commit if there are changes
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Update cloud IPv4 feed"
          git push
